<div id="contacto-sede-wrapper" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1.5">{% trans "Contacto" %}</label>
    <select name="contacto" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white">
      <option value="">{% trans "Sin contacto asignado" %}</option>
      {% for c in contactos %}
      <option value="{{ c.pk }}">{{ c.nombre }}{% if c.es_principal %} ★{% endif %} — {{ c.cargo }}</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1.5">{% trans "Sede" %}</label>
    <select name="sede" class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white">
      <option value="">{% trans "Sin sede específica" %}</option>
      {% for s in sedes %}
      <option value="{{ s.pk }}">{{ s.nombre }}{% if s.es_principal %} ★{% endif %}</option>
      {% endfor %}
    </select>
  </div>
</div>
