{% load static %}
<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin permiso — Gibit Tecnología</title>
  <script src="{% static 'js/plugins/tailwind.cdn.js' %}"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Outfit', 'system-ui', 'sans-serif'] } } }
    }
  </script>
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body class="h-full bg-gray-50 font-sans flex items-center justify-center">
  <div class="text-center px-6 max-w-md">
    <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-red-100 mb-6">
      <svg class="w-10 h-10 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
          d="M12 15v2m0 0v2m0-2h2m-2 0H10m10-8a2 2 0 01-2 2H6a2 2 0 01-2-2V5a2 2 0 012-2h2a2 2 0 012 2h4a2 2 0 012-2h2a2 2 0 012 2v5z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
          d="M12 9v2m0 4h.01"/>
      </svg>
    </div>

    <p class="text-sm font-semibold text-red-500 tracking-widest uppercase mb-2">Error 403</p>
    <h1 class="text-2xl font-bold text-gray-900 mb-3">Sin permiso de acceso</h1>
    <p class="text-gray-500 text-sm leading-relaxed mb-8">
      No tienes los permisos necesarios para ver esta página.<br>
      Si crees que es un error, contacta con un administrador.
    </p>

    <div class="flex items-center justify-center gap-3">
      <a href="javascript:history.back()"
        class="px-4 py-2 text-sm text-gray-600 border border-gray-200 rounded-lg hover:bg-gray-100 transition-colors">
        ← Volver
      </a>
      {% if user.is_authenticated %}
      <a href="{% url 'usuarios:dashboard' %}"
        class="px-4 py-2 text-sm font-medium bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
        Ir al inicio
      </a>
      {% else %}
      <a href="{% url 'usuarios:login' %}"
        class="px-4 py-2 text-sm font-medium bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
        Iniciar sesión
      </a>
      {% endif %}
    </div>
  </div>
</body>
</html>
