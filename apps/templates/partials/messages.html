{% if messages %}
<div class="px-6 pt-4 space-y-2" id="messages">
  {% for message in messages %}
  <div x-data="{ show: true }"
    x-show="show"
    x-init="setTimeout(() => show = false, 5000)"
    x-transition:enter="transition ease-out duration-200"
    x-transition:enter-start="opacity-0 translate-y-[-4px]"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-150"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    class="flex items-start gap-3 px-4 py-3 rounded-xl text-sm font-medium border
      {% if message.tags == 'success' %}
        bg-emerald-50 text-emerald-800 border-emerald-200
      {% elif message.tags == 'error' %}
        bg-red-50 text-red-800 border-red-200
      {% elif message.tags == 'warning' %}
        bg-amber-50 text-amber-800 border-amber-200
      {% else %}
        bg-blue-50 text-blue-800 border-blue-200
      {% endif %}">

    <!-- Icon -->
    <div class="flex-shrink-0 mt-0.5">
      {% if message.tags == 'success' %}
      <svg class="w-4 h-4 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
      </svg>
      {% elif message.tags == 'error' %}
      <svg class="w-4 h-4 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
      </svg>
      {% elif message.tags == 'warning' %}
      <svg class="w-4 h-4 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
          d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
      </svg>
      {% else %}
      <svg class="w-4 h-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
          d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      {% endif %}
    </div>

    <div class="flex-1">{{ message }}</div>

    <button @click="show = false"
      class="flex-shrink-0 opacity-40 hover:opacity-70 transition-opacity mt-0.5">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </div>
  {% endfor %}
</div>
{% endif %}
