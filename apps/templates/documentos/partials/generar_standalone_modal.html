<!-- Standalone generation form (served via GET, submitted via POST) -->
<div class="bg-white rounded-xl border border-gray-200 overflow-hidden max-w-md mx-auto mt-12 shadow-lg">
  <div class="px-6 py-4 border-b border-gray-100 bg-gray-50">
    <h2 class="font-semibold text-gray-800">Generar documento</h2>
    <p class="text-xs text-gray-500 mt-0.5">Plantilla: <strong>{{ plantilla.nombre }}</strong></p>
  </div>
  <form method="post" class="px-6 py-6 space-y-4">
    {% csrf_token %}
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1.5">Empresa (opcional)</label>
      <select name="empresa"
        class="w-full px-3 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="">— Sin empresa —</option>
        {% for e in empresas %}
        <option value="{{ e.pk }}">{{ e.razon_social }}</option>
        {% endfor %}
      </select>
      <p class="text-xs text-gray-400 mt-1">
        Si seleccionas una empresa se rellenarán los datos del cliente automáticamente.
      </p>
    </div>
    <div class="flex items-center justify-end gap-3 pt-3 border-t border-gray-100">
      <a href="{% url 'documentos:plantilla_list' %}"
        class="px-4 py-2 text-sm text-gray-600 hover:bg-gray-100 rounded-lg transition-colors">
        Cancelar
      </a>
      <button type="submit"
        class="px-5 py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium rounded-lg transition-colors">
        Generar documento
      </button>
    </div>
  </form>
</div>
